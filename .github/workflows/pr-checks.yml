name: PR Quality Checks

on:
  pull_request:
    branches:
      - main

jobs:
  # ============================================================================
  # Lint and Static Analysis
  # ============================================================================
  lint:
    name: Code Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install black flake8 pylint

      - name: Check Python formatting with black
        if: hashFiles('*.py') != ''
        run: |
          black --check --diff .
        continue-on-error: true

      - name: Run flake8
        if: hashFiles('*.py') != ''
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
        continue-on-error: true

  # ============================================================================
  # Documentation Check
  # ============================================================================
  docs-check:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: |
          if [ ! -f "README.md" ]; then
            echo "::warning::README.md not found"
          fi

      - name: Check for basic documentation
        run: |
          if [ -f "README.md" ]; then
            if ! grep -q "## " README.md; then
              echo "::warning::README.md appears to lack structure"
            fi
          fi

  # ============================================================================
  # PR Size Check
  # ============================================================================
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = pr.data.additions;
            const deletions = pr.data.deletions;
            const changedFiles = pr.data.changed_files;

            let size = 'small';
            let emoji = '✅';
            let comment = '';

            if (additions + deletions > 1000) {
              size = 'extra large';
              emoji = '⚠️';
              comment = 'This PR is very large. Consider breaking it into smaller PRs for easier review.';
            } else if (additions + deletions > 500) {
              size = 'large';
              emoji = '⚠️';
              comment = 'This PR is fairly large. Ensure it has good test coverage.';
            } else if (additions + deletions > 200) {
              size = 'medium';
              emoji = '👍';
            }

            console.log(`${emoji} PR Size: ${size} (+${additions}/-${deletions} lines, ${changedFiles} files)`);

            if (comment) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `${emoji} **PR Size: ${size}**\n\n${comment}\n\n*+${additions}/-${deletions} lines across ${changedFiles} files*`
              });
            }
